<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fix Jill Name</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#fff;border-radius:16px;padding:28px;width:580px;}
h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:12px;color:#888;margin-bottom:16px;}
#log{background:#0d1b2a;color:#7fff7f;font-family:monospace;font-size:11px;padding:12px;border-radius:8px;height:240px;overflow-y:auto;margin-bottom:12px;}
.btn{width:100%;padding:12px;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-bottom:8px;}
.b-run{background:#2D5BE3;color:#fff;}
.b-done{background:#0F8A5C;color:#fff;display:none;}
.btn:disabled{background:#aaa;cursor:not-allowed;}
.info{background:#E3F0FF;border-radius:8px;padding:10px 14px;font-size:12px;color:#1565C0;margin-bottom:12px;}
</style>
</head>
<body>
<div class="box">
  <h2>🔧 Fix Jill's Name in All Records</h2>
  <div class="sub">rsmonitoringimdept — one-time migration</div>
  <div class="info">
    Replaces <b>Managhaya</b> → <b>Mananghaya</b> in all Firestore records:<br>
    encodedBy, createdBy, pickedUpBy, reqBy, lastEditedBy, and per-item pickedUpBy
  </div>
  <div id="log">Click Run to start...</div>
  <button class="btn b-run" id="btnRun" onclick="runFix()">🔍 Find & Fix All Records</button>
  <button class="btn b-done" id="btnDone">✓ Done — You can close this tab</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js"></script>
<script>
var db=null;
function log(m,c){var el=document.getElementById('log');var d=document.createElement('div');d.style.color=c||'#7fff7f';d.textContent=m;el.appendChild(d);el.scrollTop=el.scrollHeight;}

try{
  firebase.initializeApp({
    apiKey:"AIzaSyDKqUDMW3F4Wh2pvWMKVqYoFOA7qql7JMU",
    authDomain:"rsmonitoringimdept.firebaseapp.com",
    projectId:"rsmonitoringimdept",
    storageBucket:"rsmonitoringimdept.firebasestorage.app",
    messagingSenderId:"61863291257",
    appId:"1:61863291257:web:b97bdf40c426b21797e7a8"
  });
  db=firebase.firestore();
  log('✓ Firebase connected');
}catch(e){log('✗ '+e.message,'#ff6b6b');}

function fix(str){ return str?str.replace(/Managhaya/g,'Mananghaya'):str; }
function hasBug(str){ return str&&str.includes('Managhaya'); }

var FIELDS=['encodedBy','createdBy','pickedUpBy','reqBy','lastEditedBy'];

function needsFix(data){
  for(var i=0;i<FIELDS.length;i++) if(hasBug(data[FIELDS[i]])) return true;
  return (data.items||[]).some(function(it){ return hasBug(it.pickedUpBy); });
}

async function runFix(){
  if(!db) return;
  document.getElementById('btnRun').disabled=true;
  log('Scanning all records...','#aaaaff');
  try{
    var snap=await db.collection('rs_records').get();
    log('Total records: '+snap.size);
    var toFix=snap.docs.filter(function(doc){ return needsFix(doc.data()); });
    log('Records needing fix: '+toFix.length, toFix.length>0?'#ffaa00':'#7fff7f');
    if(!toFix.length){
      log('✓ All clean!');
      document.getElementById('btnDone').style.display='block';
      return;
    }
    var fixed=0;
    for(var i=0;i<toFix.length;i++){
      var doc=toFix[i];
      var data=doc.data();
      var upd={};
      FIELDS.forEach(function(f){ if(hasBug(data[f])) upd[f]=fix(data[f]); });
      var items=data.items||[];
      var changed=false;
      var newItems=items.map(function(it){
        if(hasBug(it.pickedUpBy)){ changed=true; return Object.assign({},it,{pickedUpBy:fix(it.pickedUpBy)}); }
        return it;
      });
      if(changed) upd.items=newItems;
      await db.collection('rs_records').doc(doc.id).update(upd);
      fixed++;
      if(fixed%100===0||fixed===toFix.length)
        log('Fixed '+fixed+'/'+toFix.length,'#ffaa00');
    }
    log('');
    log('✓ Done! Fixed '+fixed+' records.','#00ffaa');
    document.getElementById('btnDone').style.display='block';
  }catch(e){
    log('✗ '+e.message,'#ff6b6b');
    document.getElementById('btnRun').disabled=false;
  }
}
</script>
</body>
</html>
